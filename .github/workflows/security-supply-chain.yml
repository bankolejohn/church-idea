name: Supply Chain Security

# ─────────────────────────────────────────────────────────────────────
# WHAT THIS WORKFLOW DOES:
#
# 1. TRIVY IaC SCAN — Scans Terraform files for security misconfigurations
#    (open security groups, unencrypted storage, missing logging, etc.)
#
# 2. COSIGN IMAGE SIGNING — Cryptographically signs the container image
#    after build. Proves the image wasn't tampered with between build and deploy.
#
# 3. SBOM GENERATION — Creates a Software Bill of Materials listing every
#    dependency in the image. Required for compliance (Executive Order 14028).
#
# WHY THIS EXISTS:
# Supply chain attacks are the #1 emerging threat in cloud-native:
# - SolarWinds (2020): Malicious code inserted into build pipeline
# - Codecov (2021): CI/CD tool compromised, secrets exfiltrated
# - log4j (2021): Critical vuln in a transitive dependency nobody knew they had
#
# This workflow ensures:
# - Infrastructure code is secure BEFORE deployment
# - Images are signed (tamper-proof)
# - You know EXACTLY what's in your image (SBOM)
#
# ─────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write  # Required for Cosign keyless signing

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Trivy IaC Scan (Terraform)
  # ─────────────────────────────────────────────
  iac-scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC scan on Terraform
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'infrastructure/terraform'
          severity: 'CRITICAL,HIGH,MEDIUM'
          format: 'table'
          exit-code: '0'  # Don't fail on findings (report only for now)

      - name: Run Trivy IaC scan (SARIF for GitHub Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'infrastructure/terraform'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-iac-results.sarif'

      - name: Upload IaC scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-iac-results.sarif'
          category: 'infrastructure-security'

  # ─────────────────────────────────────────────
  # Stage 2: Build, Sign, and Generate SBOM
  # ─────────────────────────────────────────────
  build-sign-sbom:
    name: Build, Sign & SBOM
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Cosign: Sign the image ────────────────────────────────
      # Uses "keyless" signing via Sigstore/Fulcio.
      # No private key to manage — identity is verified via OIDC
      # (GitHub Actions identity token proves WHO built the image).
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the container image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Verify signature
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} | jq .

      # ─── Syft: Generate SBOM ───────────────────────────────────
      # Creates a complete inventory of every package/library in the image.
      # Output formats: SPDX (ISO standard) and CycloneDX (OWASP standard)
      - name: Generate SBOM (SPDX format)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Generate SBOM (CycloneDX format)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      # Attach SBOM to the image (stored alongside it in the registry)
      - name: Attach SBOM to image via Cosign
        run: |
          cosign attest --yes \
            --predicate sbom-spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 90

      - name: Supply chain summary
        run: |
          echo "## Supply Chain Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Signed:** Yes (Cosign keyless via Sigstore)" >> $GITHUB_STEP_SUMMARY
          echo "- **SBOM:** SPDX + CycloneDX generated and attached" >> $GITHUB_STEP_SUMMARY
          echo "- **Verify:** \`cosign verify --certificate-identity-regexp='https://github.com/${{ github.repository }}.*' --certificate-oidc-issuer='https://token.actions.githubusercontent.com' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Stage 3: Scan SBOM for Vulnerabilities
  # ─────────────────────────────────────────────
  sbom-vuln-scan:
    name: SBOM Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-sign-sbom
    if: github.event_name != 'pull_request'

    steps:
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Scan SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'sbom'
          scan-ref: 'sbom-cyclonedx.json'
          severity: 'CRITICAL,HIGH'
          format: 'table'

      - name: Scan SBOM (SARIF for GitHub Security)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'sbom'
          scan-ref: 'sbom-cyclonedx.json'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'sbom-vuln-results.sarif'

      - name: Upload SBOM vulnerability results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'sbom-vuln-results.sarif'
          category: 'sbom-vulnerabilities'
