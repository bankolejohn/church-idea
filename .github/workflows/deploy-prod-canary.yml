name: Deploy to Production (Canary)

# ─────────────────────────────────────────────────────────────────────
# CANARY DEPLOYMENT VIA AWS CODEDEPLOY
#
# HOW THIS DIFFERS FROM THE STANDARD deploy-prod.yml:
# Instead of replacing all ECS tasks at once, this workflow uses
# CodeDeploy Blue/Green with a canary strategy:
#
#   1. New tasks start in the GREEN target group
#   2. CodeDeploy shifts 10% of traffic to green
#   3. Monitors CloudWatch alarms for 5 minutes
#   4. If alarms fire → INSTANT rollback (90% of users never noticed)
#   5. If alarms stay green → shifts remaining 90% of traffic
#   6. Old (blue) tasks terminate after 10 minutes
#
# WHEN TO USE THIS vs deploy-prod.yml:
# - Use THIS for production (maximum safety)
# - Use deploy-prod.yml for staging or as a fallback
#
# PREREQUISITES:
# - CodeDeploy application and deployment group exist (via Terraform)
# - ALB has two target groups (blue + green)
# - ECS service is configured for CODE_DEPLOY deployment controller
#
# ─────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (semantic version e.g. 2.1.0)'
        required: true
        type: string
      confirm:
        description: 'Type "canary-prod" to confirm canary deployment'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/bankolejohn/church-idea
  ECS_CLUSTER: church-cms-prod-cluster
  ECS_SERVICE: church-cms-prod-service
  TASK_FAMILY: church-cms-prod
  CONTAINER_NAME: church-cms-app
  CODEDEPLOY_APP: church-cms-prod
  CODEDEPLOY_GROUP: church-cms-prod-dg

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Validate
  # ─────────────────────────────────────────────
  validate:
    name: Validate Canary Deployment
    runs-on: ubuntu-latest
    outputs:
      image_full: ${{ steps.resolve.outputs.image }}

    steps:
      - name: Confirm deployment intent
        if: inputs.confirm != 'canary-prod'
        run: |
          echo "::error::Confirmation failed. Type 'canary-prod' to confirm."
          exit 1

      - name: Resolve image
        id: resolve
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists
        run: |
          docker manifest inspect ${{ steps.resolve.outputs.image }} > /dev/null 2>&1 || {
            echo "::error::Image not found: ${{ steps.resolve.outputs.image }}"
            exit 1
          }

  # ─────────────────────────────────────────────
  # Stage 2: Create CodeDeploy Deployment
  # ─────────────────────────────────────────────
  deploy-canary:
    name: Canary Deploy via CodeDeploy
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.validate.outputs.image_full }}

      - name: Register new task definition
        id: register
        run: |
          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$NEW_TASK_DEF" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_TASK_DEF"

      - name: Create AppSpec for CodeDeploy
        run: |
          cat > appspec.json << EOF
          {
            "version": 1,
            "Resources": [{
              "TargetService": {
                "Type": "AWS::ECS::Service",
                "Properties": {
                  "TaskDefinition": "${{ steps.register.outputs.task_def_arn }}",
                  "LoadBalancerInfo": {
                    "ContainerName": "${{ env.CONTAINER_NAME }}",
                    "ContainerPort": 3000
                  }
                }
              }
            }]
          }
          EOF
          cat appspec.json

      - name: Create CodeDeploy deployment
        id: deploy
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APP }} \
            --deployment-group-name ${{ env.CODEDEPLOY_GROUP }} \
            --revision '{"revisionType":"AppSpecContent","appSpecContent":{"content":"'"$(cat appspec.json | jq -c .)"'"}}' \
            --query 'deploymentId' \
            --output text)
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "## Canary Deployment Started" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment ID:** \`$DEPLOYMENT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ needs.validate.outputs.image_full }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Strategy:** Canary 10% for 5 minutes, then full shift" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monitor: https://console.aws.amazon.com/codedeploy/home?region=${{ env.AWS_REGION }}#/deployments/$DEPLOYMENT_ID" >> $GITHUB_STEP_SUMMARY

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for CodeDeploy deployment ${{ steps.deploy.outputs.deployment_id }}..."
          echo "Strategy: 10% canary → 5 min monitor → full shift"
          echo ""

          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.deploy.outputs.deployment_id }} || {
            echo ""
            echo "::error::Deployment failed or was rolled back!"
            echo ""
            # Get deployment info for debugging
            aws deploy get-deployment \
              --deployment-id ${{ steps.deploy.outputs.deployment_id }} \
              --query 'deploymentInfo.{status:status,errorInfo:errorInformation,rollback:rollbackInfo}'
            exit 1
          }

          echo ""
          echo "Canary deployment successful!"

      - name: Deployment result
        if: always()
        run: |
          STATUS=$(aws deploy get-deployment \
            --deployment-id ${{ steps.deploy.outputs.deployment_id }} \
            --query 'deploymentInfo.status' \
            --output text)

          if [ "$STATUS" = "Succeeded" ]; then
            echo "## ✅ Canary Deployment Succeeded" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Canary Deployment Failed (Status: $STATUS)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "CodeDeploy auto-rolled back. Check CloudWatch alarms for the trigger." >> $GITHUB_STEP_SUMMARY
          fi
