name: Deploy to Staging

# ─────────────────────────────────────────────────────────────────────
# WHAT THIS WORKFLOW DOES:
#
# 1. BUILD   → Builds Docker image, pushes to GHCR with SHA + "staging" tags
# 2. DEPLOY  → Updates ECS task definition with new image, waits for stability
# 3. VERIFY  → Runs lightweight bash integration tests (curl-based, fast)
# 4. E2E     → Runs full Cypress browser tests against live staging URL
#
# WHY THIS ORDER:
# - Build first (if build fails, nothing else matters)
# - Deploy (get the new code running)
# - Verify (fast sanity check — app alive, DB connected, auth works)
# - E2E (slower, browser-based, catches UI-level regressions)
#
# If ANY stage fails, the pipeline goes red. This means:
# - You get notified immediately
# - You know NOT to promote this build to production
# - The ECS circuit breaker will auto-rollback if the deploy itself is bad
# ─────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/bankolejohn/church-idea
  ECS_CLUSTER: church-cms-staging-cluster
  ECS_SERVICE: church-cms-staging-service
  TASK_FAMILY: church-cms-staging
  CONTAINER_NAME: church-cms-app

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Build & Push Image
  # ─────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_full: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=staging
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Stage 2: Database Migration Pre-Check
  # ─────────────────────────────────────────────
  migration-check:
    name: Migration Pre-Check
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run migration dry-run check
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          chmod +x scripts/migrate-check.sh
          ./scripts/migrate-check.sh

  # ─────────────────────────────────────────────
  # Stage 3: Deploy to ECS
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, migration-check]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image_full }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Deployment summary
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ needs.build.outputs.image_full }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** \`${{ env.ECS_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** \`${{ env.ECS_SERVICE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Stage 3: Integration Tests (fast, curl-based)
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Wait for ECS tasks to register with ALB
        run: sleep 30

      - name: Run integration tests
        env:
          ADMIN_USERNAME: ${{ secrets.STAGING_ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASS }}
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh "${{ secrets.STAGING_URL }}"

  # ─────────────────────────────────────────────
  # Stage 4: E2E Tests (Cypress, browser-based)
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: integration-tests
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headless: true
          config: baseUrl=${{ secrets.STAGING_URL }}
        env:
          CYPRESS_ADMIN_USERNAME: ${{ secrets.STAGING_ADMIN_USER }}
          CYPRESS_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASS }}

      - name: Upload Cypress screenshots (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Upload Cypress videos (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 5: Mark staging as verified
  # ─────────────────────────────────────────────
  staging-verified:
    name: Staging Verified
    runs-on: ubuntu-latest
    needs: [build, integration-tests, e2e-tests]
    if: success()

    steps:
      - name: Staging verification summary
        run: |
          echo "## ✅ Staging Fully Verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All gates passed for commit \`${{ github.sha }}\`:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Docker image built and pushed" >> $GITHUB_STEP_SUMMARY
          echo "- [x] ECS deployment stable" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Integration tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- [x] E2E tests passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**This build is safe to promote to production.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy to prod:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "gh workflow run deploy-prod.yml -f image_tag=${{ needs.build.outputs.image_tag }} -f confirm=deploy-prod" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
