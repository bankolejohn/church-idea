###############################################
# Church CMS - Ingress
#
# WHAT INGRESS DOES:
# Routes external HTTP/HTTPS traffic to your Service.
# On AWS EKS with the AWS Load Balancer Controller,
# this creates an ALB automatically.
#
# The annotations tell AWS HOW to configure the ALB:
# - internet-facing (public)
# - HTTPS with ACM certificate
# - Health check path
# - Target type (IP for Fargate, instance for EC2)
###############################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: church-cms
  labels:
    app: church-cms
  annotations:
    # AWS Load Balancer Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "3"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # Certificate ARN (set via overlay per environment)
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
spec:
  rules:
    - host: church-cms.example.com  # Override in overlays
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: church-cms
                port:
                  name: http
