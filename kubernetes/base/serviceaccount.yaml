###############################################
# Church CMS - Service Account
#
# WHAT THIS IS:
# A Kubernetes identity for your pods. Combined with IRSA
# (IAM Roles for Service Accounts), this allows pods to
# assume AWS IAM roles WITHOUT AWS credentials in the container.
#
# HOW IRSA WORKS:
# 1. This ServiceAccount is annotated with an IAM role ARN
# 2. When a pod starts, K8s injects a JWT token
# 3. AWS SDKs exchange that token for temporary AWS credentials
# 4. Pod can now access AWS services (S3, Secrets Manager, etc.)
#
# The role ARN annotation is added via Kustomize overlays
# (different role per environment)
###############################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: church-cms
  labels:
    app: church-cms
    app.kubernetes.io/name: church-cms
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/church-cms-pod-role
