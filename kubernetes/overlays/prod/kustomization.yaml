apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: church-cms-prod

namespace: church-cms-prod

resources:
  - ../../base

patches:
  # 3 replicas for production
  - target:
      kind: Deployment
      name: church-cms
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  # Stricter resource limits for prod
  - target:
      kind: Deployment
      name: church-cms
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
  # Production HPA
  - target:
      kind: HorizontalPodAutoscaler
      name: church-cms
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 10
  # Production domain
  - target:
      kind: Ingress
      name: church-cms
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: churchidea.johndesiventures.website
  # PDB: at least 2 pods always available in prod
  - target:
      kind: PodDisruptionBudget
      name: church-cms
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 2

configMapGenerator:
  - name: church-cms-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DB_POOL_MAX=30

images:
  - name: ghcr.io/bankolejohn/church-idea
    newTag: "2.0.0"  # Pinned version in prod (never :latest)
