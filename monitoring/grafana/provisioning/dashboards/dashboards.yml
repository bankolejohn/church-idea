# Auto-provision dashboards from JSON files
apiVersion: 1

providers:
  - name: 'Church CMS'
    orgId: 1
    folder: 'Church CMS'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
