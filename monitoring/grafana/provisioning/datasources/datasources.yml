# ──────────────────────────────────────────────────────────────────────
# Grafana Datasource Provisioning
#
# WHY THIS FILE:
# Instead of manually adding datasources in the Grafana UI, we provision
# them via config file. This means anyone spinning up the monitoring stack
# gets Prometheus, Loki, and Jaeger pre-configured — no manual clicks.
#
# This is the "infrastructure as code" approach to observability config.
# ──────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          name: TraceID
          url: '$${__value.raw}'

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
