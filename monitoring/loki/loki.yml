# ──────────────────────────────────────────────────────────────────────
# Loki Configuration (Local Development)
#
# WHAT LOKI DOES:
# Loki is "like Prometheus, but for logs." It indexes log LABELS
# (not the full text) and stores compressed log chunks. This makes it
# cheap to run compared to Elasticsearch/EFK.
#
# HOW IT WORKS:
# 1. Promtail reads container logs (stdout/stderr)
# 2. Promtail attaches labels (container_name, service, etc.)
# 3. Promtail pushes logs to Loki
# 4. Grafana queries Loki using LogQL (like PromQL for logs)
#
# EXAMPLE QUERIES IN GRAFANA:
# {service="church-cms"} | json | level="error"
# {service="church-cms"} | json | username="admin"
# rate({service="church-cms"} | json | level="error" [5m])
# ──────────────────────────────────────────────────────────────────────

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h  # 7 days for local dev

analytics:
  reporting_enabled: false
