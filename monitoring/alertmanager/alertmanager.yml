# ──────────────────────────────────────────────────────────────────────
# Alertmanager Configuration
#
# WHAT ALERTMANAGER DOES:
# Prometheus detects problems (alert rules fire). Alertmanager decides
# WHO gets notified, HOW, and handles deduplication, grouping, and silencing.
#
# THE FLOW:
# Prometheus (fires alert) → Alertmanager → Route → Receiver
#                                              │
#                                    ┌─────────┼─────────┐
#                                    ▼         ▼         ▼
#                                  Slack   PagerDuty   Email
#
# HOW TO SET UP SLACK INTEGRATION:
# 1. Go to https://api.slack.com/apps → Create New App → From scratch
# 2. Name: "Church CMS Alerts", Workspace: your workspace
# 3. Features → Incoming Webhooks → Activate
# 4. Add New Webhook to Workspace → Select channel (#alerts)
# 5. Copy the webhook URL
# 6. Set it as an environment variable: SLACK_WEBHOOK_URL
# 7. Restart alertmanager: docker compose restart alertmanager
#
# CHANNELS (recommended setup):
# - #alerts-critical → Pages on-call, requires immediate action
# - #alerts-warning  → Reviewed during business hours
# - #alerts-resolved → Confirmation that issues are fixed
#
# FOR LOCAL DEV:
# If SLACK_WEBHOOK_URL is not set, alerts go to the webhook_configs
# which just logs them (visible in alertmanager logs).
# ──────────────────────────────────────────────────────────────────────

global:
  resolve_timeout: 5m
  # Slack API URL (set via environment variable or replace directly)
  slack_api_url: '${SLACK_WEBHOOK_URL:-http://localhost:9093/api/v1/alerts}'

# ─── Route Tree ───────────────────────────────────────────────────
route:
  # Default receiver (catch-all)
  receiver: 'slack-default'

  # Group alerts by alertname — so 5 "HighLatency" alerts become 1 notification
  group_by: ['alertname', 'severity']

  # Wait 30s before sending to group more alerts together
  group_wait: 30s

  # Wait 5m before sending another notification for the same group
  group_interval: 5m

  # Wait 4h before re-sending a notification that hasn't resolved
  repeat_interval: 4h

  # Child routes (more specific rules)
  routes:
    # Critical alerts → immediate notification (short wait)
    - match:
        severity: critical
      receiver: 'slack-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: false

    # Warning alerts → less urgent
    - match:
        severity: warning
      receiver: 'slack-warning'
      group_wait: 1m
      repeat_interval: 4h
      continue: false

# ─── Receivers ────────────────────────────────────────────────────
receivers:
  # Critical: Red alert, mentions @channel
  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '🚨 {{ .GroupLabels.alertname }} [{{ .Status | toUpper }}]'
        text: |-
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .CommonLabels.severity }}
          *Runbook:* {{ .CommonAnnotations.runbook }}

          *Firing:* {{ .Alerts.Firing | len }} | *Resolved:* {{ .Alerts.Resolved | len }}
          {{ range .Alerts.Firing }}
          • {{ .Annotations.summary }} (since {{ .StartsAt.Format "15:04:05" }})
          {{ end }}
        actions:
          - type: button
            text: 'View in Prometheus'
            url: 'http://localhost:9090/alerts'
          - type: button
            text: 'View Grafana'
            url: 'http://localhost:3001/d/churchcms-app-overview'

  # Warning: Yellow alert
  - name: 'slack-warning'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '⚠️ {{ .GroupLabels.alertname }} [{{ .Status | toUpper }}]'
        text: |-
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Runbook:* {{ .CommonAnnotations.runbook }}

          {{ range .Alerts.Firing }}
          • {{ .Annotations.summary }}
          {{ end }}
        actions:
          - type: button
            text: 'View in Prometheus'
            url: 'http://localhost:9090/alerts'

  # Default: catch-all
  - name: 'slack-default'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '{{ .GroupLabels.alertname }} [{{ .Status | toUpper }}]'
        text: |-
          {{ .CommonAnnotations.summary }}
          {{ range .Alerts.Firing }}
          • {{ .Annotations.description }}
          {{ end }}

# ─── Inhibition Rules ─────────────────────────────────────────────
# If a critical alert fires, suppress warnings for the same alertname.
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
