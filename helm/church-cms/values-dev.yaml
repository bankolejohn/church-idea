# Development environment overrides
replicaCount: 1

image:
  tag: "latest"
  pullPolicy: Always

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

ingress:
  host: dev.churchidea.johndesiventures.website

config:
  NODE_ENV: development
  LOG_LEVEL: debug
  ENABLE_HTTPS: "false"
  DB_SSL: "false"
